# D-42: EB's nginx defaults client_max_body_size to 1 MB, which returns 413 for any
# upload larger than ~1 MB BEFORE the request reaches the app — so a small .txt
# uploaded fine but a .docx / .pdf / photo did not (only the OPTIONS preflight ever
# reached FastAPI; the POST was rejected by nginx). Proven in prod: a ~1 KB body got
# 401 from the app, a ~3 MB body got 413 from nginx.
#
# The application enforces its own per-role / per-endpoint caps (chat upload 20 MB in
# routes/chat_upload.py; S3 uploads up to 50 MB for owner/admin in routes/upload.py),
# so this only raises the nginx ceiling ABOVE the largest of those. The app's limits
# remain the effective ones; oversized bodies are still rejected in bounded chunks.
client_max_body_size 55M;
