version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install --legacy-peer-deps
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: build
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
      customHeaders:
        - pattern: index.html
          headers:
            - key: Cache-Control
              value: no-cache, no-store, must-revalidate
            - key: Pragma
              value: no-cache
        - pattern: static/js/*.js
          headers:
            - key: Cache-Control
              value: public, max-age=31536000, immutable
        - pattern: static/css/*.css
          headers:
            - key: Cache-Control
              value: public, max-age=31536000, immutable
    appRoot: frontend
