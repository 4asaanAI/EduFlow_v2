[pytest]
# ─── Test discovery ─────────────────────────────────────────────────────────
testpaths = tests/backend
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# ─── Custom markers ─────────────────────────────────────────────────────────
markers =
    unit: Unit tests — no external dependencies (DB, network)
    integration: Integration tests — may need the app to be importable
    api: API tests — require a running backend + seeded DB
    slow: Tests that take more than 5 seconds
    auth: Authentication-related tests

# ─── Output ─────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header

# ─── Asyncio mode (for async tests) ─────────────────────────────────────────
asyncio_mode = auto

# ─── Coverage defaults (used when pytest-cov is installed) ──────────────────
# Run with: pytest --cov=backend --cov-report=html
# coverage settings handled in .coveragerc or pyproject.toml
