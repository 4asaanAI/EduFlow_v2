[pytest]
# ─── Test discovery ─────────────────────────────────────────────────────────
testpaths = tests/backend
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# ─── Custom markers ─────────────────────────────────────────────────────────
markers =
    unit: Unit tests — no external dependencies (DB, network)
    integration: Integration tests — may need the app to be importable
    api: API tests — require a running backend + seeded DB
    slow: Tests that take more than 5 seconds
    auth: Authentication-related tests
    mongo_real: AI Layer Hardening (AD12) — requires a REAL MongoDB replica set
        (transactions/sessions/unique-index enforcement that FakeDb cannot honor).
        Deselected by default (see addopts `-m "not mongo_real"`); run explicitly
        with `pytest -m mongo_real` against a replica-set Mongo. CI runs this tier
        NIGHTLY + on AI-layer path changes only (NOT every PR) — see
        tests/backend/mongo_real/README.md.

# ─── Output ─────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header
    -m "not mongo_real"

# ─── Asyncio mode (for async tests) ─────────────────────────────────────────
asyncio_mode = auto

# ─── Coverage defaults (used when pytest-cov is installed) ──────────────────
# Run with: pytest --cov=backend --cov-report=html
# coverage settings handled in .coveragerc or pyproject.toml
